name: agrismart
description: Diagnostic intelligent de maladies des plantes pour agriculteurs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ML / TFLite
  tflite_flutter: 0.11.0

  # Base de données locale
  sqflite: ^2.3.3
  path: ^1.9.0

  # Caméra
  camera: ^0.11.0

  # GPS
  geolocator: ^12.0.0

  # Audio (TTS / STT)
  flutter_tts: ^4.0.2
  speech_to_text: 7.0.0

  # Background sync
  workmanager: 0.9.0+3
  connectivity_plus: ^6.0.3

  # Firebase (Push notifications)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Utilitaires
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  permission_handler: ^11.3.1
  image: 4.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  custom_lint: 0.7.6
  riverpod_lint: ^2.3.13
  image_picker: ^1.1.2
  dio: ^5.4.0


flutter:
  uses-material-design: true

  assets:
    - assets/ml/agrismart.tflite
    - assets/ml/labels.txt
    - assets/images/logo.png

  fonts:
    - family: AgriDisplay
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
    - family: AgriBody
      fonts:
        - asset: assets/fonts/NunitoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NunitoSans-SemiBold.ttf
          weight: 600
